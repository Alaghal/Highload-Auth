spring:

  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: auth_user
    password: auth_password

  jpa:
    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        format_sql: true

    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: debug

app:
  jwt:
    secret: "very-secret-key-change-me-in-real-project-very-secret-key"
    access-token-expiration-minutes: 15
    refresh-token-expiration-days: 7